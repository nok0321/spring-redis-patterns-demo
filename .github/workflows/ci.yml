name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Java 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        working-directory: backend
        run: chmod +x ./gradlew

      - name: Build
        working-directory: backend
        run: ./gradlew build -x test

      - name: Test + Coverage
        working-directory: backend
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/build/reports/

  frontend:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm run test:coverage

      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t cache-service-backend ./backend

      - name: Build frontend image
        run: docker build -t cache-service-frontend ./frontend

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build and start services
        run: |
          docker compose build
          docker compose up -d

      - name: Wait for health check
        run: |
          timeout=120
          elapsed=0
          until curl -sf http://localhost/health | grep -q '"status":"UP"' 2>/dev/null; do
            if [ "$elapsed" -ge "$timeout" ]; then
              echo "Health check failed after ${timeout}s"
              docker compose logs --tail=50
              exit 1
            fi
            sleep 5
            elapsed=$((elapsed + 5))
          done
          echo "Services healthy after ${elapsed}s"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/

      - name: Stop services
        if: always()
        run: docker compose down
