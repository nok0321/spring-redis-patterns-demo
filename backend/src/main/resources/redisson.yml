# ============================================
# redisson.yml - Redis接続設定リファレンス
# ============================================
#
# 注意: 実際のRedisson接続設定は RedissonConfig.java で
# プログラム的に管理されています。
# このファイルは参考用のダミーファイルです。
#
# RedissonConfig.java が環境変数 (REDIS_HOST, REDIS_PORT, REDIS_PASSWORD) を
# 使用して接続設定を動的に構築します。
#
# 参考: 既存の src/main/resources/redisson.yaml を参照してください。
# ============================================

# singleServerConfig:
#   address: "redis://${REDIS_HOST}:${REDIS_PORT}"
#   connectionPoolSize: 32
#   connectionMinimumIdleSize: 8
#   idleConnectionTimeout: 30000
#   connectTimeout: 10000
#   timeout: 5000
#   retryAttempts: 3
#   retryInterval: 1500
#   pingConnectionInterval: 30000
#   keepAlive: true
#   tcpNoDelay: true
